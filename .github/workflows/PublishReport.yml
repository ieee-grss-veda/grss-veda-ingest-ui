name: CI

on:
  push:
    branches: [main]

jobs:
  Playwright:
    name: Run Playwight tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
      - name: Enable Corepack (Yarn from packageManager)
        run: corepack enable
      - run: yarn install

      - name: Install Playwright Browsers
        run: yarn playwright install --with-deps chromium

      - name: Run Playwright E2E Tests
        run: yarn test:e2e
        env:
          NEXT_PUBLIC_DISABLE_AUTH: 'true'
          NEXT_PUBLIC_APP_ENV: local
          NEXT_PUBLIC_MOCK_SCOPES: dataset:update stac:collection:update dataset:create
          NEXT_PUBLIC_KEYCLOAK_ISSUER: https://example.test/realms/veda
          KEYCLOAK_CLIENT_ID: ingest-ui
          APP_ID: '1'
          INSTALLATION_ID: '1'

      - name: Upload Playwright Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30

      - name: Publish HTML report to GH Page
        if: always()
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: playwright-report/
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
