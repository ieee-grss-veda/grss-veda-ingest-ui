name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Run all tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
      - name: Enable Corepack (Yarn from packageManager)
        run: corepack enable
      - run: yarn install

      - name: Lint
        run: yarn lint

      - name: Type checking
        run: yarn type-check

      - name: Run unit tests
        run: yarn test

      - name: Install Playwright Browsers
        run: yarn playwright install --with-deps chromium

      - name: Run Playwright E2E Tests
        run: yarn test:e2e
        env:
          NEXT_PUBLIC_DISABLE_AUTH: 'true'
          NEXT_PUBLIC_APP_ENV: local
          NEXT_PUBLIC_MOCK_SCOPES: dataset:update stac:collection:update dataset:create
          NEXT_PUBLIC_KEYCLOAK_ISSUER: https://example.test/realms/veda
          KEYCLOAK_CLIENT_ID: ingest-ui
          APP_ID: '1'
          INSTALLATION_ID: '1'

      - name: Upload Playwright Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30
