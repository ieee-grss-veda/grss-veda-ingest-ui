version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 22
        - nvm use 22
        - corepack enable
        - yarn cache clean
        - yarn install
    build:
      commands:
        # Write non-secret environment variables to .env.production
        - env | grep -e APP_ID -e INSTALLATION_ID -e ASSUME_ROLE_ARN -e KEYCLOAK_CLIENT_ID -e NEXTAUTH_URL >> .env.production
        # Write NEXT_PUBLIC_ variables to .env.production
        - env | grep -e NEXT_PUBLIC_ >> .env.production
        # Runtime-only secrets (GITHUB_PRIVATE_KEY, KEYCLOAK_CLIENT_SECRET,
        # NEXTAUTH_SECRET, INGEST_UI_EXTERNAL_ID) are provided by the Amplify
        # Secrets tab and injected at SSR runtime — they are NOT needed during
        # the build and should NOT be written to .env.production.
        #
        # NEXT_PUBLIC_KEYCLOAK_ISSUER is already captured by the NEXT_PUBLIC_
        # grep above.
        - yarn build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
