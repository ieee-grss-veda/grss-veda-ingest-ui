version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 22
        - nvm use 22
        - corepack enable
        - yarn cache clean
        - yarn install
    build:
      commands:
        # Write non-secret environment variables to .env.production
        - env | grep -e APP_ID -e INSTALLATION_ID -e ASSUME_ROLE_ARN -e KEYCLOAK_CLIENT_ID -e NEXTAUTH_URL >> .env.production
        # Write NEXT_PUBLIC_ variables to .env.production
        - env | grep -e NEXT_PUBLIC_ >> .env.production
        # Write secrets to .env.production.
        # Prefers Amplify Hosting Secrets (SSM Parameter Store) over plain Environment Variables.
        # Falls back to the environment variable and logs the reason so missing IAM permissions
        # can be diagnosed without failing the build.
        - |
          write_secret() {
            local var_name="$1"
            local ssm_path="/amplify/${AWS_APP_ID}/${AWS_BRANCH}/${var_name}"
            local secret_value

            echo "[secrets] Trying SSM path: ${ssm_path}"
            if secret_value=$(aws ssm get-parameter \
              --name "${ssm_path}" \
              --with-decryption \
              --query "Parameter.Value" \
              --output text 2>&1); then
              echo "[secrets] SUCCESS: '${var_name}' retrieved from Amplify Secrets (SSM)"
            else
              echo "[secrets] WARNING: Could not read '${var_name}' from Amplify Secrets (SSM)"
              echo "[secrets] SSM error output: ${secret_value}"
              echo "[secrets] Falling back to environment variable for '${var_name}'"
              secret_value="${!var_name}"
              if [ -z "${secret_value}" ]; then
                echo "[secrets] ERROR: '${var_name}' is missing from both Amplify Secrets and environment variables"
              else
                echo "[secrets] OK: '${var_name}' found via environment variable fallback"
              fi
            fi

            printf '%s="%s"\n' "${var_name}" "${secret_value}" >> .env.production
          }

          write_secret "GITHUB_PRIVATE_KEY"
          write_secret "KEYCLOAK_CLIENT_SECRET"
          write_secret "NEXTAUTH_SECRET"
          write_secret "INGEST_UI_EXTERNAL_ID"
          write_secret "NEXT_PUBLIC_KEYCLOAK_ISSUER"
        - yarn build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
